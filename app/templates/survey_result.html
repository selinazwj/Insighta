<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Results — Insighta</title>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    :root {
      --ink: #1a1a18; --ink-soft: #4a4a44; --ink-muted: #8a8a82;
      --paper: #faf9f5; --paper-warm: #f3f1ea;
      --accent: #2d6a4f; --accent-light: #52b788; --accent-warm: #e07a3c;
      --line: #e0ddd3;
      --serif: 'DM Serif Display', Georgia, serif;
      --sans: 'DM Sans', system-ui, sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--sans); background: var(--paper); color: var(--ink); min-height: 100vh; }

    /* Navbar */
    .navbar { background: rgba(250,249,245,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--line); padding: 14px 48px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
    .navbar-left { display: flex; align-items: center; gap: 16px; }
    .back-btn { display: flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 500; color: var(--ink-muted); text-decoration: none; padding: 7px 12px; border-radius: 8px; border: 1px solid var(--line); transition: all 0.2s; }
    .back-btn:hover { color: var(--ink); background: var(--paper-warm); }
    .navbar-brand { font-family: var(--serif); font-size: 18px; color: var(--ink); }
    .navbar-brand span { color: var(--accent); }

    /* Layout */
    .container { max-width: 820px; margin: 0 auto; padding: 40px 24px 80px; }

    /* Header */
    .page-header { margin-bottom: 32px; }
    .page-header h1 { font-family: var(--serif); font-size: 34px; color: var(--ink); letter-spacing: -0.8px; margin-bottom: 6px; }
    .page-header h1 em { font-style: italic; color: var(--accent); }
    .page-header p { font-size: 15px; color: var(--ink-muted); font-weight: 300; }

    /* Stats row */
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 32px; }
    .stat-card { background: white; border: 1.5px solid var(--line); border-radius: 14px; padding: 20px 24px; }
    .stat-value { font-family: var(--serif); font-size: 36px; color: var(--accent); margin-bottom: 4px; }
    .stat-label { font-size: 13px; color: var(--ink-muted); font-weight: 300; }

    /* Question result cards */
    .q-result { background: white; border: 1.5px solid var(--line); border-radius: 14px; padding: 24px 28px; margin-bottom: 16px; }
    .q-result-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 20px; }
    .q-result-num { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; color: var(--ink-muted); text-transform: uppercase; margin-bottom: 4px; }
    .q-result-text { font-size: 17px; font-weight: 500; color: var(--ink); line-height: 1.4; }
    .q-type-badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 100px; background: var(--paper-warm); color: var(--ink-muted); border: 1px solid var(--line); white-space: nowrap; flex-shrink: 0; }
    .q-answer-count { font-size: 13px; color: var(--ink-muted); margin-bottom: 16px; }

    /* Bar chart for single/multiple/dropdown */
    .bar-list { display: flex; flex-direction: column; gap: 10px; }
    .bar-row { display: flex; align-items: center; gap: 12px; }
    .bar-label { font-size: 14px; color: var(--ink-soft); min-width: 140px; flex-shrink: 0; }
    .bar-track { flex: 1; height: 28px; background: var(--paper-warm); border-radius: 6px; overflow: hidden; }
    .bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-light)); border-radius: 6px; transition: width 0.6s ease; display: flex; align-items: center; padding-left: 10px; min-width: 28px; }
    .bar-fill-text { font-size: 12px; font-weight: 600; color: white; white-space: nowrap; }
    .bar-count { font-size: 13px; color: var(--ink-muted); min-width: 40px; text-align: right; }

    /* Scale result */
    .scale-result { display: flex; flex-direction: column; gap: 12px; }
    .scale-avg { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
    .scale-avg-num { font-family: var(--serif); font-size: 48px; color: var(--accent); }
    .scale-avg-label { font-size: 14px; color: var(--ink-muted); }
    .scale-bar-row { display: flex; align-items: center; gap: 10px; }
    .scale-dot-label { width: 20px; text-align: center; font-size: 13px; font-weight: 600; color: var(--ink-muted); }

    /* Text responses */
    .text-responses { display: flex; flex-direction: column; gap: 8px; max-height: 360px; overflow-y: auto; }
    .text-response-item { padding: 12px 16px; background: var(--paper-warm); border-radius: 10px; font-size: 14px; color: var(--ink-soft); line-height: 1.6; border-left: 3px solid var(--line); }

    /* AI Analysis */
    .ai-analysis-section { background: linear-gradient(135deg, rgba(45,106,79,0.06), rgba(82,183,136,0.04)); border: 1.5px solid rgba(45,106,79,0.2); border-radius: 16px; padding: 28px 32px; margin-top: 32px; }
    .ai-analysis-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .ai-icon { width: 38px; height: 38px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .ai-analysis-header h2 { font-family: var(--serif); font-size: 20px; color: var(--ink); }
    .ai-analysis-header p { font-size: 13px; color: var(--ink-muted); font-weight: 300; }
    .btn-analyze { padding: 11px 24px; background: var(--accent); color: white; border: none; border-radius: 10px; font-family: var(--sans); font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-analyze:hover { background: #245c43; }
    .btn-analyze:disabled { opacity: 0.6; cursor: not-allowed; }
    .analysis-result { margin-top: 20px; padding: 20px 24px; background: white; border-radius: 12px; border: 1px solid var(--line); font-size: 15px; color: var(--ink-soft); line-height: 1.8; display: none; }
    .analysis-result.visible { display: block; }
    .analysis-footer { margin-top: 12px; font-size: 12px; color: var(--ink-muted); }

    /* Loading */
    .loading-state { text-align: center; padding: 60px 20px; }
    .loading-state p { font-size: 15px; color: var(--ink-muted); }

    @media (max-width: 640px) {
      .navbar { padding: 12px 16px; }
      .container { padding: 28px 16px 60px; }
      .stats-row { grid-template-columns: 1fr 1fr; }
      .q-result { padding: 18px 20px; }
      .bar-label { min-width: 100px; font-size: 13px; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-left">
    <a href="/publisher" class="back-btn">← Back</a>
    <div class="navbar-brand">Insight<span>a</span></div>
  </div>
</nav>

<div class="container">

  <div class="page-header">
    <h1 id="surveyTitle">Loading <em>results...</em></h1>
    <p id="surveySubtitle"></p>
  </div>

  <!-- Stats row -->
  <div class="stats-row" id="statsRow" style="display:none;">
    <div class="stat-card">
      <div class="stat-value" id="statTotal">—</div>
      <div class="stat-label">Total responses</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statQuestions">—</div>
      <div class="stat-label">Questions</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statCompletion">—</div>
      <div class="stat-label">Completion rate</div>
    </div>
  </div>

  <!-- Question results -->
  <div id="resultsList">
    <div class="loading-state"><p>Loading results...</p></div>
  </div>

  <!-- AI Analysis -->
  <div class="ai-analysis-section" id="aiSection" style="display:none;">
    <div class="ai-analysis-header">
      <div class="ai-icon">✨</div>
      <div>
        <h2>AI Analysis</h2>
        <p>Let Claude find patterns and insights in your data.</p>
      </div>
    </div>
    <button class="btn-analyze" id="analyzeBtn" onclick="runAnalysis()">
      Analyze Results →
    </button>
    <div class="analysis-result" id="analysisResult"></div>
  </div>

</div>

<script>
  const SURVEY_ID = {{ survey_id }};

  // ── Load results ──────────────────────────────────────────
  async function loadResults() {
    try {
      const res = await fetch(`/surveys/${SURVEY_ID}/results`, {
        credentials: 'same-origin'
      });
      if (!res.ok) throw new Error('Failed to load');
      const data = await res.json();
      renderResults(data);
    } catch(e) {
      document.getElementById('resultsList').innerHTML =
        '<div class="loading-state"><p>Failed to load results. Please refresh.</p></div>';
    }
  }

  // ── Render everything ─────────────────────────────────────
  function renderResults(data) {
    // Header
    document.getElementById('surveyTitle').innerHTML =
      `${data.survey_title} — <em>Results</em>`;
    document.getElementById('surveySubtitle').textContent =
      `${data.total_responses} response${data.total_responses !== 1 ? 's' : ''} collected`;

    // Stats
    document.getElementById('statTotal').textContent = data.total_responses;
    document.getElementById('statQuestions').textContent = data.questions.length;
    document.getElementById('statCompletion').textContent =
      data.total_responses > 0 ? '100%' : '—';
    document.getElementById('statsRow').style.display = 'grid';

    // Questions
    const list = document.getElementById('resultsList');
    if (data.questions.length === 0 || data.total_responses === 0) {
      list.innerHTML = '<div class="loading-state"><p>No responses yet.</p></div>';
      return;
    }

    list.innerHTML = data.questions.map((q, i) => renderQResult(q, i)).join('');

    // Show AI section
    document.getElementById('aiSection').style.display = 'block';
  }

  // ── Render a single question result ──────────────────────
  function renderQResult(q, index) {
    const typeLabels = {
      single: 'Single choice', multiple: 'Multiple choice',
      text: 'Text', scale: 'Scale', dropdown: 'Dropdown'
    };

    let bodyHtml = '';

    if (['single', 'multiple', 'dropdown'].includes(q.question_type)) {
      const dist = q.distribution || {};
      const total = Object.values(dist).reduce((a, b) => a + b, 0) || 1;
      const sorted = Object.entries(dist).sort((a, b) => b[1] - a[1]);

      bodyHtml = `
        <div class="q-answer-count">${q.total_answers} answer${q.total_answers !== 1 ? 's' : ''}</div>
        <div class="bar-list">
          ${sorted.map(([label, count]) => {
            const pct = Math.round((count / total) * 100);
            return `
              <div class="bar-row">
                <div class="bar-label">${escHtml(label)}</div>
                <div class="bar-track">
                  <div class="bar-fill" style="width:${pct}%">
                    <span class="bar-fill-text">${pct}%</span>
                  </div>
                </div>
                <div class="bar-count">${count}</div>
              </div>`;
          }).join('')}
        </div>`;

    } else if (q.question_type === 'scale') {
      const dist = q.distribution || {};
      const total = Object.values(dist).reduce((a, b) => a + b, 0) || 1;

      bodyHtml = `
        <div class="scale-result">
          <div class="scale-avg">
            <div class="scale-avg-num">${q.average ?? '—'}</div>
            <div class="scale-avg-label">/ 5 average · ${q.total_answers} answer${q.total_answers !== 1 ? 's' : ''}</div>
          </div>
          <div class="bar-list">
            ${[1,2,3,4,5].map(n => {
              const count = dist[String(n)] || 0;
              const pct = Math.round((count / total) * 100);
              return `
                <div class="bar-row">
                  <div class="scale-dot-label">${n}</div>
                  <div class="bar-track">
                    <div class="bar-fill" style="width:${pct}%">
                      ${pct > 8 ? `<span class="bar-fill-text">${pct}%</span>` : ''}
                    </div>
                  </div>
                  <div class="bar-count">${count}</div>
                </div>`;
            }).join('')}
          </div>
        </div>`;

    } else if (q.question_type === 'text') {
      const responses = q.responses || [];
      bodyHtml = `
        <div class="q-answer-count">${responses.length} response${responses.length !== 1 ? 's' : ''}</div>
        <div class="text-responses">
          ${responses.length === 0
            ? '<div class="text-response-item" style="color:var(--ink-muted)">No responses yet.</div>'
            : responses.map(r => `<div class="text-response-item">${escHtml(String(r))}</div>`).join('')}
        </div>`;
    }

    return `
      <div class="q-result">
        <div class="q-result-header">
          <div>
            <div class="q-result-num">Question ${index + 1}</div>
            <div class="q-result-text">${escHtml(q.question_text)}</div>
          </div>
          <span class="q-type-badge">${typeLabels[q.question_type] || q.question_type}</span>
        </div>
        ${bodyHtml}
      </div>`;
  }

  // ── AI Analysis ───────────────────────────────────────────
  async function runAnalysis() {
    const btn = document.getElementById('analyzeBtn');
    btn.disabled = true;
    btn.textContent = 'Analyzing...';

    try {
      const res = await fetch(`/surveys/${SURVEY_ID}/analyze`, {
        method: 'POST', credentials: 'same-origin'
      });
      if (!res.ok) throw new Error('Analysis failed');
      const data = await res.json();

      const resultEl = document.getElementById('analysisResult');
      resultEl.innerHTML = data.analysis.replace(/\n/g, '<br>') +
        `<div class="analysis-footer">Generated at ${new Date(data.generated_at).toLocaleString()}</div>`;
      resultEl.classList.add('visible');
      btn.textContent = 'Re-analyze →';
    } catch(e) {
      alert('Analysis failed. Please try again.');
      btn.textContent = 'Analyze Results →';
    } finally {
      btn.disabled = false;
    }
  }

  // ── Helper ────────────────────────────────────────────────
  function escHtml(str) {
    return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Init ──────────────────────────────────────────────────
  loadResults();
</script>

</body>
</html>
