<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile - SurveyBridge</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif;
    background: #FFFFFF;
    color: #37352F;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.register-container {
    background: #FAFAF9;
    padding: 40px 50px;
    border-radius: 16px;
    border: 1px solid #E9E9E7;
    width: 100%;
    max-width: 700px;
}

.header {
    text-align: center;
    margin-bottom: 32px;
}

.header h1 {
    font-size: 36px;
    font-weight: 700;
    margin-bottom: 8px;
    color: #000000;
    letter-spacing: -1px;
}

.header p {
    font-size: 16px;
    color: #787774;
}

.form-section {
    margin-bottom: 24px;
}

.section-title {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #9B9A97;
    margin-bottom: 12px;
}

.form-row {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
    margin-bottom: 12px;
}

.form-row.two-columns {
    grid-template-columns: 1fr 1fr;
}

input, select {
    padding: 12px 16px;
    border-radius: 8px;
    border: 1px solid #E9E9E7;
    font-size: 15px;
    background: #FFFFFF;
    color: #37352F;
    transition: all 0.2s;
}

input:focus, select:focus {
    outline: none;
    border-color: #000000;
    box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.05);
}

input::placeholder {
    color: #9B9A97;
}

select {
    appearance: none;
    background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%2337352F' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 12px center;
    padding-right: 36px;
    cursor: pointer;
    color: #9B9A97;
}

select:invalid {
    color: #9B9A97;
}

select:not(:invalid) {
    color: #37352F;
}

select option {
    color: #37352F;
}

.btn-submit {
    width: 100%;
    padding: 14px;
    background: #000000;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    margin-top: 16px;
}

.btn-submit:hover {
    background: #2F2F2F;
}

@media (max-width: 640px) {
    body {
        padding: 10px;
    }
    
    .register-container {
        padding: 30px 24px;
    }
    
    .header {
        margin-bottom: 24px;
    }
    
    .header h1 {
        font-size: 28px;
        margin-bottom: 6px;
    }
    
    .header p {
        font-size: 14px;
    }
    
    .form-section {
        margin-bottom: 20px;
    }
    
    .form-row.two-columns {
        grid-template-columns: 1fr;
    }
}
</style>
</head>
<body>

<div class="register-container">
    <div class="header">
        <h1>My Profile</h1>
        <p>View and edit your personal information</p>
    </div>

    <form method="POST" action="/profile">
        <div class="form-section">
            <div class="section-title">Account Information</div>
            
            <div class="form-row">
                <input name="username" type="text" placeholder="Username" value="{{ user.username or '' }}">
            </div>
            
            <div class="form-row">
                <input name="email" type="email" required placeholder="Email address" value="{{ user.email }}">
            </div>
        </div>

        <div class="form-section">
            <div class="section-title">Profile Details</div>
            
            <div class="form-row two-columns">
                <select name="age_range">
                    <option value="" disabled {% if not user.age_range %}selected{% endif %}>Age range</option>
                    <option value="18-24" {% if user.age_range=='18-24' %}selected{% endif %}>18-24</option>
                    <option value="25-34" {% if user.age_range=='25-34' %}selected{% endif %}>25-34</option>
                    <option value="35-44" {% if user.age_range=='35-44' %}selected{% endif %}>35-44</option>
                    <option value="45+" {% if user.age_range=='45+' %}selected{% endif %}>45+</option>
                </select>
                
                <select name="education_level">
                    <option value="" disabled {% if not user.education_level %}selected{% endif %}>Education level</option>
                    <option value="High School" {% if user.education_level=='High School' %}selected{% endif %}>High School</option>
                    <option value="Undergraduate" {% if user.education_level=='Undergraduate' %}selected{% endif %}>Undergraduate</option>
                    <option value="Graduate" {% if user.education_level=='Graduate' %}selected{% endif %}>Graduate</option>
                    <option value="PhD" {% if user.education_level=='PhD' %}selected{% endif %}>PhD</option>
                </select>
            </div>
            
            <div class="form-row two-columns">
                <select name="field">
                    <option value="" disabled {% if not user.field %}selected{% endif %}>Field / Major</option>
                    <option value="Computer Science & Engineering" {% if user.field=='Computer Science & Engineering' or user.field=='Computer Science' or user.field=='Engineering' %}selected{% endif %}>Computer Science & Engineering</option>
                    <option value="Business & Economics" {% if user.field=='Business & Economics' or user.field=='Business' %}selected{% endif %}>Business & Economics</option>
                    <option value="Medicine & Healthcare" {% if user.field=='Medicine & Healthcare' or user.field=='Medicine / Healthcare' %}selected{% endif %}>Medicine & Healthcare</option>
                    <option value="Natural Sciences" {% if user.field=='Natural Sciences' %}selected{% endif %}>Natural Sciences</option>
                    <option value="Social Sciences" {% if user.field=='Social Sciences' %}selected{% endif %}>Social Sciences</option>
                    <option value="Arts & Humanities" {% if user.field=='Arts & Humanities' %}selected{% endif %}>Arts & Humanities</option>
                    <option value="Education" {% if user.field=='Education' %}selected{% endif %}>Education</option>
                    <option value="Law" {% if user.field=='Law' %}selected{% endif %}>Law</option>
                    <option value="Other" {% if user.field=='Other' %}selected{% endif %}>Other</option>
                </select>
                
                <select name="status">
                    <option value="" disabled {% if not user.status %}selected{% endif %}>Current status</option>
                    <option value="student" {% if user.status=='student' %}selected{% endif %}>Student</option>
                    <option value="working" {% if user.status=='working' %}selected{% endif %}>Working</option>
                    <option value="freelancer" {% if user.status=='freelancer' %}selected{% endif %}>Freelancer</option>
                    <option value="other" {% if user.status=='other' %}selected{% endif %}>Other</option>
                </select>
            </div>
            
            <div class="form-row two-columns">
                <select name="country">
                    <option value="" disabled {% if not user.country %}selected{% endif %}>Country</option>
                    <option value="Australia" {% if user.country=='Australia' %}selected{% endif %}>Australia</option>
                    <option value="Canada" {% if user.country=='Canada' %}selected{% endif %}>Canada</option>
                    <option value="China" {% if user.country=='China' %}selected{% endif %}>China</option>
                    <option value="France" {% if user.country=='France' %}selected{% endif %}>France</option>
                    <option value="Germany" {% if user.country=='Germany' %}selected{% endif %}>Germany</option>
                    <option value="India" {% if user.country=='India' %}selected{% endif %}>India</option>
                    <option value="Japan" {% if user.country=='Japan' %}selected{% endif %}>Japan</option>
                    <option value="Mexico" {% if user.country=='Mexico' %}selected{% endif %}>Mexico</option>
                    <option value="Saudi Arabia" {% if user.country=='Saudi Arabia' %}selected{% endif %}>Saudi Arabia</option>
                    <option value="Singapore" {% if user.country=='Singapore' %}selected{% endif %}>Singapore</option>
                    <option value="South Korea" {% if user.country=='South Korea' %}selected{% endif %}>South Korea</option>
                    <option value="Spain" {% if user.country=='Spain' %}selected{% endif %}>Spain</option>
                    <option value="United Arab Emirates" {% if user.country=='United Arab Emirates' %}selected{% endif %}>United Arab Emirates</option>
                    <option value="United Kingdom" {% if user.country=='United Kingdom' %}selected{% endif %}>United Kingdom</option>
                    <option value="United States" {% if user.country=='United States' %}selected{% endif %}>United States</option>
                    <option value="Other" {% if user.country=='Other' %}selected{% endif %}>Other</option>
                </select>
                
                <select name="language">
                    <option value="" disabled {% if not user.language %}selected{% endif %}>Primary language</option>
                    <option value="Arabic" {% if user.language=='Arabic' %}selected{% endif %}>Arabic</option>
                    <option value="English" {% if user.language=='English' %}selected{% endif %}>English</option>
                    <option value="French" {% if user.language=='French' %}selected{% endif %}>French</option>
                    <option value="German" {% if user.language=='German' %}selected{% endif %}>German</option>
                    <option value="Hindi" {% if user.language=='Hindi' %}selected{% endif %}>Hindi</option>
                    <option value="Japanese" {% if user.language=='Japanese' %}selected{% endif %}>Japanese</option>
                    <option value="Korean" {% if user.language=='Korean' %}selected{% endif %}>Korean</option>
                    <option value="Mandarin Chinese" {% if user.language=='Mandarin Chinese' %}selected{% endif %}>Mandarin Chinese</option>
                    <option value="Spanish" {% if user.language=='Spanish' %}selected{% endif %}>Spanish</option>
                    <option value="Other" {% if user.language=='Other' %}selected{% endif %}>Other</option>
                </select>
            </div>
        </div>

        <button type="submit" class="btn-submit">Save Changes</button>
    </form>
</div>

<script>
document.querySelectorAll('select').forEach(select => {
    select.addEventListener('change', function() {
        if (this.value === '') {
            this.style.color = '#9B9A97';
        } else {
            this.style.color = '#37352F';
        }
    });
    
    if (select.value !== '') {
        select.style.color = '#37352F';
    }
});
</script>

</body>
</html>
