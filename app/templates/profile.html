<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link rel="apple-touch-icon" href="/static/favicon.png">
    <meta name="theme-color" content="#050E1F">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile - Insighta</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif;
    background: #FFFFFF;
    color: #37352F;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.register-container {
    background: #FAFAF9;
    padding: 40px 50px;
    border-radius: 16px;
    border: 1px solid #E9E9E7;
    width: 100%;
    max-width: 700px;
}

.header {
    text-align: center;
    margin-bottom: 32px;
}

.header h1 {
    font-size: 36px;
    font-weight: 700;
    margin-bottom: 8px;
    color: #000000;
    letter-spacing: -1px;
}

.header p {
    font-size: 16px;
    color: #787774;
}

.form-section {
    margin-bottom: 24px;
}

.section-title {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #9B9A97;
    margin-bottom: 12px;
}

.form-row {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
    margin-bottom: 12px;
}

.form-row.two-columns {
    grid-template-columns: 1fr 1fr;
}

input, select {
    padding: 12px 16px;
    border-radius: 8px;
    border: 1px solid #E9E9E7;
    font-size: 15px;
    background: #FFFFFF;
    transition: all 0.2s;
}

input {
    color: #37352F;
}

input:focus, select:focus {
    outline: none;
    border-color: #000000;
    box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.05);
}

input::placeholder {
    color: #9B9A97;
}

select {
    appearance: none;
    background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%2337352F' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 12px center;
    padding-right: 36px;
    cursor: pointer;
    color: #9B9A97;
}

select option {
    color: #37352F;
}

.multiselect-label {
    font-size: 14px;
    font-weight: 600;
    color: #37352F;
    margin-bottom: 10px;
    display: block;
}

.multiselect-wrap {
    position: relative;
}

.multiselect-trigger {
    width: 100%;
    padding: 12px 40px 12px 16px;
    border-radius: 8px;
    border: 1px solid #E9E9E7;
    font-size: 15px;
    background: #FFFFFF;
    color: #37352F;
    text-align: left;
    cursor: pointer;
    appearance: none;
    background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%2337352F' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 12px center;
}

.multiselect-trigger.placeholder {
    color: #9B9A97;
}

.multiselect-trigger:hover {
    border-color: #D9D9D9;
}

.multiselect-wrap.open .multiselect-trigger {
    border-color: #000000;
    box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.05);
}

.multiselect-panel {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    margin-top: 4px;
    padding: 8px 0;
    background: #FFFFFF;
    border: 1px solid #E9E9E7;
    border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    z-index: 50;
    max-height: 240px;
    overflow-y: auto;
}

.multiselect-wrap.open .multiselect-panel {
    display: block;
}

.multiselect-panel label {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    font-size: 15px;
    color: #37352F;
    cursor: pointer;
    margin: 0;
}

.multiselect-panel label:hover {
    background: #FAFAF9;
}

.multiselect-panel input[type="checkbox"] {
    width: 18px;
    height: 18px;
    margin: 0;
    accent-color: #000000;
    flex-shrink: 0;
}

.btn-submit {
    width: 100%;
    padding: 14px;
    background: #000000;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    margin-top: 16px;
}

.btn-submit:hover {
    background: #2F2F2F;
}

@media (max-width: 640px) {
    body {
        padding: 10px;
    }
    
    .register-container {
        padding: 30px 24px;
    }
    
    .header {
        margin-bottom: 24px;
    }
    
    .header h1 {
        font-size: 28px;
        margin-bottom: 6px;
    }
    
    .header p {
        font-size: 14px;
    }
    
    .form-section {
        margin-bottom: 20px;
    }
    
    .form-row.two-columns {
        grid-template-columns: 1fr;
    }
}
</style>
</head>
<body>

<div class="register-container">

        <p>View and edit your personal information</p>
    </div>

                    <option value="25-34" {% if user.age_range=='25-34' %}selected{% endif %}>25-34</option>
                    <option value="35-44" {% if user.age_range=='35-44' %}selected{% endif %}>35-44</option>
                    <option value="45+" {% if user.age_range=='45+' %}selected{% endif %}>45+</option>

                    <option value="Undergraduate" {% if user.education_level=='Undergraduate' %}selected{% endif %}>Undergraduate</option>
                    <option value="Graduate" {% if user.education_level=='Graduate' %}selected{% endif %}>Graduate</option>
                    <option value="PhD" {% if user.education_level=='PhD' %}selected{% endif %}>PhD</option>
                </select>
            </div>
            
            <div class="form-row two-columns">

                    <option value="" disabled {% if not user.field %}selected{% endif %}>Field / Major</option>

                    <option value="Business & Economics" {% if user.field=='Business & Economics' or user.field=='Business' %}selected{% endif %}>Business & Economics</option>
                    <option value="Medicine & Healthcare" {% if user.field=='Medicine & Healthcare' or user.field=='Medicine / Healthcare' %}selected{% endif %}>Medicine & Healthcare</option>
                    <option value="Natural Sciences" {% if user.field=='Natural Sciences' %}selected{% endif %}>Natural Sciences</option>
                    <option value="Social Sciences" {% if user.field=='Social Sciences' %}selected{% endif %}>Social Sciences</option>
                    <option value="Arts & Humanities" {% if user.field=='Arts & Humanities' %}selected{% endif %}>Arts & Humanities</option>
                    <option value="Education" {% if user.field=='Education' %}selected{% endif %}>Education</option>
                    <option value="Law" {% if user.field=='Law' %}selected{% endif %}>Law</option>
                    <option value="Other" {% if user.field=='Other' %}selected{% endif %}>Other</option>
                </select>

                    <option value="student" {% if user.status=='student' %}selected{% endif %}>Student</option>
                    <option value="working" {% if user.status=='working' %}selected{% endif %}>Working</option>
                    <option value="freelancer" {% if user.status=='freelancer' %}selected{% endif %}>Freelancer</option>
                    <option value="other" {% if user.status=='other' %}selected{% endif %}>Other</option>

                    <option value="Arizona" {% if user.state=='Arizona' %}selected{% endif %}>Arizona</option>
                    <option value="Arkansas" {% if user.state=='Arkansas' %}selected{% endif %}>Arkansas</option>
                    <option value="California" {% if user.state=='California' %}selected{% endif %}>California</option>
                    <option value="Colorado" {% if user.state=='Colorado' %}selected{% endif %}>Colorado</option>

                    <option value="Delaware" {% if user.state=='Delaware' %}selected{% endif %}>Delaware</option>
                    <option value="Florida" {% if user.state=='Florida' %}selected{% endif %}>Florida</option>

                    <option value="Indiana" {% if user.state=='Indiana' %}selected{% endif %}>Indiana</option>
                    <option value="Iowa" {% if user.state=='Iowa' %}selected{% endif %}>Iowa</option>
                    <option value="Kansas" {% if user.state=='Kansas' %}selected{% endif %}>Kansas</option>
                    <option value="Kentucky" {% if user.state=='Kentucky' %}selected{% endif %}>Kentucky</option>
                    <option value="Louisiana" {% if user.state=='Louisiana' %}selected{% endif %}>Louisiana</option>

                    <option value="Massachusetts" {% if user.state=='Massachusetts' %}selected{% endif %}>Massachusetts</option>
                    <option value="Michigan" {% if user.state=='Michigan' %}selected{% endif %}>Michigan</option>
                    <option value="Minnesota" {% if user.state=='Minnesota' %}selected{% endif %}>Minnesota</option>
                    <option value="Mississippi" {% if user.state=='Mississippi' %}selected{% endif %}>Mississippi</option>
                    <option value="Missouri" {% if user.state=='Missouri' %}selected{% endif %}>Missouri</option>
                    <option value="Montana" {% if user.state=='Montana' %}selected{% endif %}>Montana</option>
                    <option value="Nebraska" {% if user.state=='Nebraska' %}selected{% endif %}>Nebraska</option>
                    <option value="Nevada" {% if user.state=='Nevada' %}selected{% endif %}>Nevada</option>
                    <option value="New Hampshire" {% if user.state=='New Hampshire' %}selected{% endif %}>New Hampshire</option>
                    <option value="New Jersey" {% if user.state=='New Jersey' %}selected{% endif %}>New Jersey</option>

                    <option value="North Dakota" {% if user.state=='North Dakota' %}selected{% endif %}>North Dakota</option>
                    <option value="Ohio" {% if user.state=='Ohio' %}selected{% endif %}>Ohio</option>

        </div>

        <button type="submit" class="btn-submit">Save Changes</button>

</div>

<script>
document.querySelectorAll('select').forEach(select => {
    select.style.color = select.value === '' ? '#9B9A97' : '#37352F';
    select.addEventListener('change', function() {
        this.style.color = this.value === '' ? '#9B9A97' : '#37352F';
    });
});

(function() {
    var wrap = document.getElementById('language-multiselect');
    if (!wrap) return;
    var trigger = wrap.querySelector('.multiselect-trigger');
    var panel = wrap.querySelector('.multiselect-panel');
    var checkboxes = panel.querySelectorAll('input[name="language"]');

    function getLabelText() {
        var labels = [];
        checkboxes.forEach(function(cb) {
            if (cb.checked) labels.push(cb.parentElement.textContent.trim());
        });
        return labels.length ? labels.join(', ') : '';
    }

    function updateTrigger() {
        var text = getLabelText();
        trigger.textContent = text || 'In what language(s) are you able to fill out the survey?';
        trigger.classList.toggle('placeholder', !text);
        trigger.setAttribute('aria-expanded', wrap.classList.contains('open'));
    }

    trigger.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        wrap.classList.toggle('open');
        trigger.setAttribute('aria-expanded', wrap.classList.contains('open'));
    });

    panel.addEventListener('click', function(e) {
        e.stopPropagation();
    });

    checkboxes.forEach(function(cb) {
        cb.addEventListener('change', updateTrigger);
    });

    document.addEventListener('click', function() {
        wrap.classList.remove('open');
        trigger.setAttribute('aria-expanded', 'false');
    });

    updateTrigger();
})();
</script>

</body>
</html>
