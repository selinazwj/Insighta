<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Published - Insighta</title>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <style>
    :root{--green:#3b7c4f;--green-d:#2a5c39;--green-l:#e8f2eb;--ink:#1a1a18;--ink2:#4a4a44;--ink3:#8a8a82;--bg:#fafaf8;--line:#eeece6;--line2:#e0ddd6;--serif:'DM Serif Display',Georgia,serif;--sans:'DM Sans',system-ui,sans-serif;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--sans);background:var(--bg);color:var(--ink);min-height:100vh;display:grid;place-items:center;padding:24px;-webkit-font-smoothing:antialiased;}
    .card{width:min(500px,100%);background:#fff;border:.5px solid var(--line);border-radius:12px;padding:42px 36px;text-align:center;box-shadow:0 10px 32px rgba(26,26,24,.05);}
    .mark{width:58px;height:58px;border-radius:50%;background:var(--green-l);color:var(--green);display:grid;place-items:center;margin:0 auto 22px;font-size:28px;font-weight:800;border:.5px solid #c2deca;}
    h1{font-family:var(--serif);font-size:34px;font-weight:400;letter-spacing:-.6px;margin-bottom:8px}.sub{font-size:15px;color:var(--ink3);line-height:1.6;margin-bottom:28px;}
    .actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}.btn{min-width:160px;padding:11px 18px;border-radius:8px;border:.5px solid var(--line2);font-size:14px;font-weight:700;text-decoration:none;color:var(--ink2);background:#fff}.btn.primary{background:var(--green);border-color:var(--green);color:#fff}.btn:hover{background:#f5f3ee}.btn.primary:hover{background:var(--green-d);}
  </style>
</head>
<body>
  <main class="card">
    <div class="mark">✓</div>
    <h1>Survey published</h1>
    <p class="sub">Your survey is live and ready for participants.</p>
    <div class="actions">
      <a class="btn primary" href="/publisher">Back to dashboard</a>
      <a class="btn" href="{{ form_url }}" target="_blank" rel="noopener">Open survey</a>
    </div>
  </main>
</body>
</html>
