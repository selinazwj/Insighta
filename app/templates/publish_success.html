<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Published - SurveyBridge</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #FFFFFF;
    height: 100vh;
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #37352F;
}

.box {
    background: #FAFAF9;
    border: 1px solid #E9E9E7;
    padding: 48px;
    border-radius: 16px;
    text-align: center;
    max-width: 500px;
}

.box h2 {
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 12px;
    color: #000000;
    letter-spacing: -0.5px;
}

.box p {
    font-size: 18px;
    color: #787774;
    margin-bottom: 32px;
}

button {
    margin: 8px;
    padding: 12px 24px;
    border-radius: 8px;
    border: none;
    font-size: 16px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.15s ease;
    text-decoration: none;
    display: inline-block;
}

.primary {
    background: #000000;
    color: white;
}

.primary:hover {
    background: #2F2F2F;
}

.secondary {
    background: transparent;
    border: 1.5px solid #D9D9D9;
    color: #37352F;
}

.secondary:hover {
    background: #F7F6F3;
    border-color: #37352F;
}
</style>
</head>
<body>

<div class="box">
    <h2>🎉 Survey Published!</h2>
    <p>Your survey is now live.</p>

    <div>
        <a href="/publisher">
            <button class="primary">Back to Dashboard</button>
        </a>

        <a href="{{ form_url }}" target="_blank">
            <button class="secondary">Open Survey</button>
        </a>
    </div>
</div>

</body>
</html>
