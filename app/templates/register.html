<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - SurveyBridge</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif;
    background: #FFFFFF;
    color: #37352F;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.register-container {
    background: #FAFAF9;
    padding: 40px 50px;
    border-radius: 16px;
    border: 1px solid #E9E9E7;
    width: 100%;
    max-width: 700px;
}

.header {
    text-align: center;
    margin-bottom: 32px;
}

.header h1 {
    font-size: 36px;
    font-weight: 700;
    margin-bottom: 8px;
    color: #000000;
    letter-spacing: -1px;
}

.header p {
    font-size: 16px;
    color: #787774;
}

.error-box {
    background: #FEE;
    color: #C00;
    padding: 12px 16px;
    border-radius: 8px;
    margin-bottom: 20px;
    font-size: 14px;
    border: 1px solid #FCC;
}

.form-section {
    margin-bottom: 24px;
}

.section-title {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #9B9A97;
    margin-bottom: 12px;
}

.form-row {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
    margin-bottom: 12px;
}

.form-row.two-columns {
    grid-template-columns: 1fr 1fr;
}

input, select {
    padding: 12px 16px;
    border-radius: 8px;
    border: 1px solid #E9E9E7;
    font-size: 15px;
    background: #FFFFFF;
    color: #37352F;
    transition: all 0.2s;
}

input:focus, select:focus {
    outline: none;
    border-color: #000000;
    box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.05);
}

input::placeholder {
    color: #9B9A97;
}

select {
    appearance: none;
    background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%2337352F' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 12px center;
    padding-right: 36px;
    cursor: pointer;
    color: #9B9A97;
}

select option {
    color: #37352F;
}

.btn-submit {
    width: 100%;
    padding: 14px;
    background: #000000;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    margin-top: 16px;
}

.btn-submit:hover {
    background: #2F2F2F;
}

.login-link {
    text-align: center;
    margin-top: 16px;
    font-size: 15px;
    color: #787774;
}

.login-link a {
    color: #000000;
    font-weight: 600;
    text-decoration: none;
}

.login-link a:hover {
    text-decoration: underline;
}

@media (max-width: 640px) {
    body {
        padding: 10px;
    }
    
    .register-container {
        padding: 30px 24px;
    }
    
    .header {
        margin-bottom: 24px;
    }
    
    .header h1 {
        font-size: 28px;
        margin-bottom: 6px;
    }
    
    .header p {
        font-size: 14px;
    }
    
    .form-section {
        margin-bottom: 20px;
    }
    
    .form-row.two-columns {
        grid-template-columns: 1fr;
    }
}
</style>
</head>
<body>

<div class="register-container">
    <div class="header">
        <h1>Join Us</h1>
        <p>Create your free account</p>
    </div>

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/register">
        <div class="form-section">
            <div class="section-title">Account Credentials</div>
            
            <div class="form-row">
                <input name="email" type="email" required placeholder="Email address">
            </div>
            
            <div class="form-row two-columns">
                <input name="password" type="password" required placeholder="Password">
                <input name="confirm" type="password" required placeholder="Confirm password">
            </div>
        </div>

        <div class="form-section">
            <div class="section-title">Profile Info (Optional)</div>
            
            <div class="form-row two-columns">
                <select name="age_range">
                    <option value="" disabled selected>Age range</option>
                    <option value="18-24">18-24</option>
                    <option value="25-34">25-34</option>
                    <option value="35-44">35-44</option>
                    <option value="45+">45+</option>
                </select>
                
                <select name="education_level">
                    <option value="" disabled selected>Education level</option>
                    <option value="High School">High School</option>
                    <option value="Undergraduate">Undergraduate</option>
                    <option value="Graduate">Graduate</option>
                    <option value="PhD">PhD</option>
                </select>
            </div>
            
            <div class="form-row two-columns">
                <select name="field">
                    <option value="" disabled selected>Field / Major</option>
                    <option value="Computer Science & Engineering">Computer Science & Engineering</option>
                    <option value="Business & Economics">Business & Economics</option>
                    <option value="Medicine & Healthcare">Medicine & Healthcare</option>
                    <option value="Natural Sciences">Natural Sciences</option>
                    <option value="Social Sciences">Social Sciences</option>
                    <option value="Arts & Humanities">Arts & Humanities</option>
                    <option value="Education">Education</option>
                    <option value="Law">Law</option>
                    <option value="Other">Other</option>
                </select>
                
                <select name="status">
                    <option value="" disabled selected>Current status</option>
                    <option value="student">Student</option>
                    <option value="working">Working</option>
                    <option value="freelancer">Freelancer</option>
                    <option value="other">Other</option>
                </select>
            </div>
            
            <div class="form-row two-columns">
                <select name="country">
                    <option value="" disabled selected>Country</option>
                    <option value="Australia">Australia</option>
                    <option value="Canada">Canada</option>
                    <option value="China">China</option>
                    <option value="France">France</option>
                    <option value="Germany">Germany</option>
                    <option value="India">India</option>
                    <option value="Japan">Japan</option>
                    <option value="Mexico">Mexico</option>
                    <option value="Saudi Arabia">Saudi Arabia</option>
                    <option value="Singapore">Singapore</option>
                    <option value="South Korea">South Korea</option>
                    <option value="Spain">Spain</option>
                    <option value="United Arab Emirates">United Arab Emirates</option>
                    <option value="United Kingdom">United Kingdom</option>
                    <option value="United States">United States</option>
                    <option value="Other">Other</option>
                </select>
                
                <select name="language">
                    <option value="" disabled selected>Primary language</option>
                    <option value="Arabic">Arabic</option>
                    <option value="English">English</option>
                    <option value="French">French</option>
                    <option value="German">German</option>
                    <option value="Hindi">Hindi</option>
                    <option value="Japanese">Japanese</option>
                    <option value="Korean">Korean</option>
                    <option value="Mandarin Chinese">Mandarin Chinese</option>
                    <option value="Spanish">Spanish</option>
                    <option value="Other">Other</option>
                </select>
            </div>
        </div>

        <button type="submit" class="btn-submit">Create Account</button>
    </form>

    <p class="login-link">
        Already have an account? <a href="/login">Sign In</a>
    </p>
</div>

<script>
document.querySelectorAll('select').forEach(select => {
    select.addEventListener('change', function() {
        if (this.value === '') {
            this.style.color = '#9B9A97';
        } else {
            this.style.color = '#37352F';
        }
    });
});
</script>

</body>
</html>
