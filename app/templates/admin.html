<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Insighta Feedback</title>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #1a1a18;
      --ink-soft: #4a4a44;
      --ink-muted: #8a8a82;
      --paper: #faf9f5;
      --paper-warm: #f3f1ea;
      --accent: #2d6a4f;
      --accent-light: #52b788;
      --accent-warm: #e07a3c;
      --line: #e0ddd3;
      --serif: 'DM Serif Display', Georgia, serif;
      --sans: 'DM Sans', system-ui, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { font-family: var(--sans); background: var(--paper); color: var(--ink); min-height: 100vh; }

    /* ── LOGIN ── */
    .login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-card {
      background: white;
      border: 1.5px solid var(--line);
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    .login-card h1 {
      font-family: var(--serif);
      font-size: 26px;
      color: var(--ink);
      margin-bottom: 8px;
    }

    .login-card p {
      font-size: 14px;
      color: var(--ink-muted);
      margin-bottom: 28px;
      font-weight: 300;
    }

    .login-card input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--line);
      border-radius: 10px;
      font-family: var(--sans);
      font-size: 15px;
      color: var(--ink);
      background: var(--paper);
      margin-bottom: 12px;
      transition: all 0.2s;
    }

    .login-card input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(45,106,79,0.08);
    }

    .login-card button {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      font-family: var(--sans);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .login-card button:hover { background: #245c43; }

    .login-error {
      font-size: 13px;
      color: #c53030;
      margin-top: 10px;
      display: none;
    }

    /* ── MAIN ── */
    .main-screen { display: none; }

    .topbar {
      background: var(--ink);
      padding: 16px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .topbar-brand {
      font-family: var(--serif);
      font-size: 18px;
      color: white;
    }

    .topbar-brand span { color: var(--accent-light); }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 13px;
      color: rgba(255,255,255,0.5);
    }

    .btn-logout {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.6);
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-logout:hover { color: white; border-color: rgba(255,255,255,0.5); }

    .container { max-width: 1000px; margin: 0 auto; padding: 40px 24px; }

    /* ── STATS ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: white;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 20px 24px;
    }

    .stat-label { font-size: 11px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 8px; }
    .stat-value { font-family: var(--serif); font-size: 28px; color: var(--ink); }
    .stat-value.green { color: var(--accent); }
    .stat-value.orange { color: var(--accent-warm); }

    /* ── FILTER ── */
    .filter-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 7px 16px;
      border: 1.5px solid var(--line);
      border-radius: 100px;
      font-size: 13px;
      font-weight: 600;
      color: var(--ink-muted);
      background: white;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover { border-color: var(--accent-light); color: var(--ink); }
    .filter-btn.active { border-color: var(--accent); background: var(--accent); color: white; }

    /* ── FEEDBACK CARDS ── */
    .feedback-list { display: flex; flex-direction: column; gap: 14px; }

    .feedback-card {
      background: white;
      border: 1.5px solid var(--line);
      border-radius: 14px;
      padding: 24px 28px;
      transition: all 0.15s;
    }

    .feedback-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.05); }
    .feedback-card.credited { border-color: rgba(45,106,79,0.3); background: rgba(45,106,79,0.02); }
    .feedback-card.rejected { opacity: 0.5; }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 12px;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .cat-badge {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 100px;
      background: var(--paper-warm);
      color: var(--ink-soft);
      border: 1px solid var(--line);
    }

    .status-badge {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 100px;
    }

    .status-pending  { background: #FEF3C7; color: #92400E; }
    .status-credited { background: rgba(45,106,79,0.1); color: var(--accent); }
    .status-rejected { background: #F3F4F6; color: #6B7280; }

    .card-user {
      font-size: 12px;
      color: var(--ink-muted);
    }

    .card-date {
      font-size: 12px;
      color: var(--ink-muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .card-title {
      font-family: var(--serif);
      font-size: 18px;
      color: var(--ink);
      letter-spacing: -0.3px;
      margin-bottom: 8px;
    }

    .card-content {
      font-size: 14px;
      color: var(--ink-soft);
      line-height: 1.7;
      font-weight: 300;
      margin-bottom: 16px;
    }

    .card-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }

    .credit-input {
      padding: 8px 12px;
      border: 1.5px solid var(--line);
      border-radius: 8px;
      font-family: var(--sans);
      font-size: 14px;
      width: 100px;
      color: var(--ink);
      transition: all 0.2s;
    }

    .credit-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(45,106,79,0.08);
    }

    .btn-credit {
      padding: 8px 18px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-credit:hover { background: #245c43; }
    .btn-credit:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-reject {
      padding: 8px 18px;
      background: transparent;
      color: var(--ink-muted);
      border: 1.5px solid var(--line);
      border-radius: 8px;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-reject:hover { background: var(--paper-warm); color: var(--ink); }

    .credited-note {
      font-size: 13px;
      color: var(--accent);
      font-weight: 600;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--ink-muted);
    }

    .empty-state p { font-size: 16px; font-weight: 300; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <h1>Admin Panel</h1>
    <p>Enter your admin key to continue</p>
    <input type="password" id="adminKeyInput" placeholder="Admin key" onkeydown="if(event.key==='Enter') login()">
    <button onclick="login()">Sign In →</button>
    <div class="login-error" id="loginError">Invalid admin key</div>
  </div>
</div>

<!-- MAIN -->
<div class="main-screen" id="mainScreen">
  <div class="topbar">
    <div class="topbar-brand">Insight<span>a</span> Admin</div>
    <div class="topbar-right">
      <span id="adminKeyDisplay"></span>
      <button class="btn-logout" onclick="logout()">Sign Out</button>
    </div>
  </div>

  <div class="container">

    <div class="stats-row" id="statsRow">
      <div class="stat-card">
        <div class="stat-label">Total Feedback</div>
        <div class="stat-value" id="statTotal">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pending Review</div>
        <div class="stat-value orange" id="statPending">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Credited</div>
        <div class="stat-value green" id="statCredited">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Credit Issued</div>
        <div class="stat-value green" id="statAmount">—</div>
      </div>
    </div>

    <div class="filter-row">
      <button class="filter-btn active" onclick="filterFeedback('all', this)">All</button>
      <button class="filter-btn" onclick="filterFeedback('pending', this)">⏳ Pending</button>
      <button class="filter-btn" onclick="filterFeedback('credited', this)">✅ Credited</button>
      <button class="filter-btn" onclick="filterFeedback('rejected', this)">❌ Rejected</button>
      <button class="filter-btn" onclick="filterFeedback('bug', this)">🐛 Bug</button>
      <button class="filter-btn" onclick="filterFeedback('feature_request', this)">✨ Feature</button>
      <button class="filter-btn" onclick="filterFeedback('ux', this)">🎨 UX</button>
    </div>

    <div class="feedback-list" id="feedbackList">
      <div class="empty-state"><p>Loading...</p></div>
    </div>

  </div>
</div>

<script>
  let adminKey = '';
  let allFeedbacks = [];
  let currentFilter = 'all';

  function login() {
    const key = document.getElementById('adminKeyInput').value.trim();
    if (!key) return;
    adminKey = key;
    loadFeedbacks();
  }

  function logout() {
    adminKey = '';
    allFeedbacks = [];
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('mainScreen').style.display = 'none';
    document.getElementById('adminKeyInput').value = '';
  }

  async function loadFeedbacks() {
    try {
      const res = await fetch(`/admin/feedbacks?admin_key=${encodeURIComponent(adminKey)}`);
      if (res.status === 403) {
        document.getElementById('loginError').style.display = 'block';
        adminKey = '';
        return;
      }
      const data = await res.json();
      allFeedbacks = data;

      document.getElementById('loginError').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('mainScreen').style.display = 'block';
      document.getElementById('adminKeyDisplay').textContent = 'Signed in';

      updateStats();
      renderFeedbacks();
    } catch {
      document.getElementById('loginError').style.display = 'block';
      document.getElementById('loginError').textContent = 'Connection error. Try again.';
    }
  }

  function updateStats() {
    const total = allFeedbacks.length;
    const pending = allFeedbacks.filter(f => f.status === 'pending').length;
    const credited = allFeedbacks.filter(f => f.status === 'credited').length;
    const totalAmount = allFeedbacks.reduce((sum, f) => sum + (f.credit_amount || 0), 0);

    document.getElementById('statTotal').textContent = total;
    document.getElementById('statPending').textContent = pending;
    document.getElementById('statCredited').textContent = credited;
    document.getElementById('statAmount').textContent = '$' + totalAmount.toFixed(2);
  }

  function filterFeedback(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderFeedbacks();
  }

  function renderFeedbacks() {
    const list = document.getElementById('feedbackList');
    let filtered = allFeedbacks;

    if (currentFilter === 'pending')  filtered = allFeedbacks.filter(f => f.status === 'pending');
    else if (currentFilter === 'credited') filtered = allFeedbacks.filter(f => f.status === 'credited');
    else if (currentFilter === 'rejected') filtered = allFeedbacks.filter(f => f.status === 'rejected');
    else if (['bug','feature_request','ux','general'].includes(currentFilter)) {
      filtered = allFeedbacks.filter(f => f.category === currentFilter);
    }

    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty-state"><p>No feedback found</p></div>`;
      return;
    }

    const CAT_LABELS = { bug: '🐛 Bug', feature_request: '✨ Feature', ux: '🎨 UX', general: '💬 General', other: '📌 Other' };

    list.innerHTML = filtered.map(f => {
      const date = new Date(f.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      const catLabel = CAT_LABELS[f.category] || f.category;
      const statusClass = `status-${f.status}`;
      const cardClass = f.status === 'credited' ? 'credited' : f.status === 'rejected' ? 'rejected' : '';

      const actions = f.status === 'pending' ? `
        <input type="number" class="credit-input" id="amount-${f.id}" placeholder="$0.00" step="0.50" min="0.50">
        <button class="btn-credit" onclick="grantCredit(${f.id})">Grant Credit</button>
        <button class="btn-reject" onclick="rejectFeedback(${f.id})">Reject</button>
      ` : f.status === 'credited' ? `
        <span class="credited-note">✓ $${f.credit_amount.toFixed(2)} credit issued</span>
      ` : `<span style="font-size:13px; color: var(--ink-muted);">Rejected</span>`;

      return `
        <div class="feedback-card ${cardClass}" id="card-${f.id}">
          <div class="card-top">
            <div class="card-meta">
              <span class="cat-badge">${catLabel}</span>
              <span class="status-badge ${statusClass}">${f.status}</span>
              <span class="card-user">👤 ${f.user_email}</span>
            </div>
            <span class="card-date">${date}</span>
          </div>
          <div class="card-title">${f.title}</div>
          <div class="card-content">${f.content}</div>
          <div class="card-actions">${actions}</div>
        </div>`;
    }).join('');
  }

  async function grantCredit(feedbackId) {
    const amountInput = document.getElementById(`amount-${feedbackId}`);
    const amount = parseFloat(amountInput.value);
    if (!amount || amount <= 0) { alert('Enter a valid amount'); return; }

    const btn = amountInput.nextElementSibling;
    btn.disabled = true;
    btn.textContent = 'Sending...';

    try {
      const res = await fetch(`/admin/feedback/${feedbackId}/credit`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ admin_key: adminKey, amount })
      });
      const data = await res.json();
      if (!res.ok) { alert(data.detail || 'Error'); btn.disabled = false; btn.textContent = 'Grant Credit'; return; }

      // Update local data
      const f = allFeedbacks.find(f => f.id === feedbackId);
      if (f) { f.status = 'credited'; f.credit_amount = amount; }
      updateStats();
      renderFeedbacks();
    } catch {
      alert('Network error');
      btn.disabled = false;
      btn.textContent = 'Grant Credit';
    }
  }

  async function rejectFeedback(feedbackId) {
    if (!confirm('Mark this feedback as rejected?')) return;
    try {
      const res = await fetch(`/admin/feedback/${feedbackId}/reject`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ admin_key: adminKey })
      });
      if (res.ok) {
        const f = allFeedbacks.find(f => f.id === feedbackId);
        if (f) f.status = 'rejected';
        updateStats();
        renderFeedbacks();
      }
    } catch { alert('Network error'); }
  }
</script>

</body>
</html>
