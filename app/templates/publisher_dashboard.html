<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0; url=/publisher">
  <title>Researcher Dashboard - Insighta</title>
  {% include "_seo_head.html" %}
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <style>
    :root{--green:#3b7c4f;--green-d:#2a5c39;--ink:#1a1a18;--ink3:#8a8a82;--bg:#fafaf8;--line:#eeece6;--serif:'DM Serif Display',Georgia,serif;--sans:'DM Sans',system-ui,sans-serif;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--sans);background:var(--bg);color:var(--ink);min-height:100vh;display:grid;place-items:center;padding:24px;-webkit-font-smoothing:antialiased;}
    .card{width:min(440px,100%);background:#fff;border:.5px solid var(--line);border-radius:12px;padding:32px;text-align:center;}
    .brand{font-size:15px;font-weight:700;margin-bottom:20px}.brand span{color:var(--green);}
    h1{font-family:var(--serif);font-size:30px;font-weight:400;letter-spacing:-.5px;margin-bottom:8px}p{font-size:14px;color:var(--ink3);line-height:1.6;margin-bottom:22px}
    a{display:inline-flex;justify-content:center;min-width:180px;padding:11px 18px;border-radius:8px;background:var(--green);color:#fff;text-decoration:none;font-size:14px;font-weight:700}a:hover{background:var(--green-d);}
  </style>
</head>
<body>
  <main class="card">
    <div class="brand">Insight<span>a</span></div>
    <h1>Opening dashboard</h1>
    <p>You are being redirected to the current researcher workspace.</p>
    <a href="/publisher">Go to dashboard</a>
  </main>
</body>
</html>
