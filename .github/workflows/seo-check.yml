name: SEO checks

on:
  push:
  pull_request:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Run dependency-free SEO audit
        run: python scripts/seo_audit.py --strict
      - name: Install application dependencies
        run: pip install -r requirements.txt
      - name: Run SEO route smoke tests
        run: python scripts/smoke_test_seo.py
